<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>نظام إدارة العقارات</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#004633">
<style>
:root{--green:#004633;--green2:#0b7056;--light:#eef7f2;--line:#dbe5df;--text:#13233a;--muted:#6b7785;--danger:#c0392b;--gold:#b88b6a;--bg:#f6f8f7}
*{box-sizing:border-box} body{margin:0;background:var(--bg);font-family:system-ui,-apple-system,"Segoe UI",Tahoma,Arial,sans-serif;color:var(--text)}
button,input,select,textarea{font:inherit} button{cursor:pointer;border:0}.app{max-width:980px;margin:auto;padding:14px}.top{display:flex;gap:10px;align-items:center;justify-content:space-between;margin:8px 0 16px}.brand{display:flex;align-items:center;gap:10px}.brand img{width:58px;height:58px;object-fit:contain}.brand h1{font-size:24px;margin:0;color:var(--green)}.actions{display:flex;gap:8px;flex-wrap:wrap}.btn{border-radius:12px;padding:10px 14px;background:#fff;border:1px solid var(--line);color:var(--green);font-weight:700}.btn.primary{background:var(--green);color:#fff}.btn.danger{background:#fff2f1;color:var(--danger);border-color:#f0c5c0}.btn.gold{background:#f6efe9;color:#7b4c32;border-color:#ead2c1}.search{display:grid;gap:8px}.search input{width:100%;padding:14px;border:1px solid var(--line);border-radius:14px;background:#fff}.filters{display:flex;gap:8px;overflow:auto;padding:10px 0}.chip{min-width:86px;padding:10px;border:1px solid var(--line);background:#fff;border-radius:16px;text-align:center;color:var(--green);font-weight:700}.chip.active{background:var(--green);color:#fff}.tabs{display:flex;background:#fff;border:1px solid var(--line);border-radius:14px;margin:8px 0;overflow:hidden}.tabs button{flex:1;padding:12px;background:#fff;color:var(--green);font-weight:700}.tabs button.active{background:var(--light);box-shadow:inset 0 -3px var(--green)}
.card{background:#fff;border:1px solid var(--line);border-radius:18px;margin:12px 0;overflow:hidden;box-shadow:0 8px 22px rgba(0,0,0,.04)}.property-card{display:grid;grid-template-columns:155px 1fr;gap:12px;padding:12px}.thumb{height:120px;border-radius:14px;overflow:hidden;position:relative;background:#edf1f0}.thumb img{width:100%;height:100%;object-fit:cover}.badge{display:inline-flex;align-items:center;gap:6px;border-radius:10px;padding:6px 9px;font-size:12px;font-weight:800}.badge.ok{background:#e8f8ee;color:#078239}.badge.warn{background:#fff5dd;color:#b66c00}.badge.off{background:#f4f4f4;color:#555}.offer{background:var(--light);border-radius:12px;padding:8px 10px;color:var(--green);font-weight:800;text-align:center}.pc-head{display:flex;justify-content:space-between;gap:8px}.pc h3{margin:0 0 6px;font-size:20px}.meta{display:flex;gap:14px;flex-wrap:wrap;color:#344}.meta span{white-space:nowrap}.pc-actions{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}.iconbtn{width:42px;height:38px;border-radius:10px;background:#f7faf9;border:1px solid var(--line);color:var(--green)}
.screen{display:none}.screen.active{display:block}.page-head{display:flex;justify-content:space-between;align-items:center;margin:8px 0 14px}.title{font-size:22px;font-weight:900;color:var(--green)}.section{background:#fff;border:1px solid var(--line);border-radius:16px;margin:12px 0;padding:14px}.section h2{font-size:18px;margin:0 0 12px;color:var(--green);border-bottom:2px solid var(--light);padding-bottom:8px}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.field label{display:block;font-size:12px;font-weight:800;color:var(--green);margin-bottom:5px}.field input,.field select,.field textarea{width:100%;border:1px solid var(--line);border-radius:10px;padding:10px;background:#fff}.field textarea{min-height:86px;resize:vertical}.private{border-color:#eed5c6;background:#fffaf7}.private h2{color:#8b4f30}.hint{font-size:12px;color:var(--muted)}.media-row{display:flex;gap:10px;overflow:auto}.media-item{width:128px;height:90px;border-radius:12px;overflow:hidden;position:relative;background:#edf1f0;flex:0 0 auto}.media-item img{width:100%;height:100%;object-fit:cover}.media-item button{position:absolute;top:5px;left:5px;background:#fff;border-radius:50%;width:24px;height:24px;color:var(--danger)}.details-hero{height:310px;border-radius:18px;overflow:hidden;background:#edf1f0}.details-hero img{width:100%;height:100%;object-fit:cover}.info-table{display:grid;grid-template-columns:repeat(3,1fr);border:1px solid var(--line);border-radius:14px;overflow:hidden}.info-cell{padding:12px;border-left:1px solid var(--line);border-bottom:1px solid var(--line);min-height:72px}.info-cell b{display:block;color:var(--green);font-size:13px}.info-cell span{font-weight:800}.service-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:0;border:1px solid var(--line);border-radius:14px;overflow:hidden}.service-grid div{padding:13px;text-align:center;border-left:1px solid var(--line);border-bottom:1px solid var(--line)}.linkish{color:var(--green);font-weight:900;text-decoration:underline;cursor:pointer}.contact-line{display:flex;gap:8px;flex-wrap:wrap}.footer-actions{position:sticky;bottom:0;background:rgba(246,248,247,.94);backdrop-filter:blur(8px);padding:10px;display:flex;gap:8px;border-top:1px solid var(--line);z-index:20}.footer-actions .btn{flex:1}.empty{padding:40px;text-align:center;color:var(--muted)}
.print-sheet{display:none}
@media(max-width:720px){.app{padding:10px}.brand h1{font-size:19px}.property-card{grid-template-columns:120px 1fr}.thumb{height:100px}.grid,.grid3{grid-template-columns:repeat(2,1fr)}.info-table{grid-template-columns:repeat(2,1fr)}.service-grid{grid-template-columns:repeat(3,1fr)}.details-hero{height:230px}.top{align-items:flex-start}.actions{justify-content:flex-end}.btn{padding:9px 10px}.pc h3{font-size:17px}}
@media print{body{background:#fff}.app{display:none}.print-sheet{display:block}.p-page{width:210mm;min-height:297mm;padding:11mm 10mm 16mm;margin:0 auto;background:white;position:relative;page-break-after:always;font-family:Tahoma,Arial,sans-serif;color:#102}.p-head{display:grid;grid-template-columns:42mm 1fr 42mm;align-items:center;gap:8mm;margin-bottom:6mm}.p-logo{display:flex;align-items:center;gap:5mm;justify-content:flex-end}.p-logo img{width:35mm;height:25mm;object-fit:contain}.p-logo b{font-size:15px;color:var(--green)}.p-title{text-align:center}.p-title h1{margin:0;color:var(--green);font-size:26px}.p-title small{color:#335}.p-offer{background:var(--green);color:#fff;border-radius:4mm;padding:4mm;text-align:center}.p-offer b{font-size:28px}.p-section{border:1px solid #cfdad4;border-radius:2mm;margin:4mm 0;overflow:hidden}.p-section-title{background:var(--green);color:#fff;text-align:center;font-weight:800;padding:2mm}.p-grid{display:grid;grid-template-columns:repeat(3,1fr)}.p-cell{border-left:1px solid #d9e2de;border-bottom:1px solid #d9e2de;padding:3mm;min-height:16mm}.p-cell label{display:block;color:var(--green);font-size:10px;font-weight:bold}.p-cell span{font-size:13px;font-weight:bold}.p-hero{width:100%;height:72mm;border-radius:3mm;object-fit:cover;border:1px solid #d9e2de}.p-two{display:grid;grid-template-columns:1fr 1fr;gap:5mm}.p-table{width:100%;border-collapse:collapse;font-size:11px}.p-table th{background:var(--green);color:white;padding:2.2mm}.p-table td{border:1px solid #d9e2de;padding:2.2mm;text-align:center}.p-desc{padding:5mm;line-height:1.8;font-size:13px}.p-services{display:grid;grid-template-columns:repeat(5,1fr)}.p-services div{text-align:center;border-left:1px solid #d9e2de;border-bottom:1px solid #d9e2de;padding:4mm 2mm}.p-gallery{display:grid;grid-template-columns:1fr 1fr;gap:4mm}.p-gallery img{height:72mm;width:100%;object-fit:cover;border-radius:2mm;border:1px solid #d9e2de}.p-footer{position:absolute;bottom:0;left:0;right:0;background:var(--green);color:#fff;display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:2mm;align-items:center;padding:5mm 10mm;font-size:12px}.p-footer img{width:27mm;height:17mm;object-fit:contain;filter:brightness(0) invert(1)}.p-muted{color:#f0f7f4}.watermark{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;opacity:.035;pointer-events:none}.watermark img{width:140mm}.no-print{display:none!important}}
</style>
</head>
<body>
<div class="app">
  <section id="home" class="screen active"></section>
  <section id="form" class="screen"></section>
  <section id="details" class="screen"></section>
  <section id="settings" class="screen"></section>
</div>
<div id="printRoot" class="print-sheet"></div>
<input id="hiddenFile" type="file" accept="image/*,video/*" multiple hidden>
<input id="backupFile" type="file" accept=".aqarbackup,.json" hidden>
<script>
const $=s=>document.querySelector(s); const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const storeKey='aqarSystem_v3'; const settingsKey='aqarSettings_v3';
let properties=JSON.parse(localStorage.getItem(storeKey)||'[]');
let settings=JSON.parse(localStorage.getItem(settingsKey)||'null')||{company:'مؤسسة رواد الأفق للاستثمار',phone1:'0552209226',phone2:'0500277257',email:'rwadalafq@gmail.com',address:'الفيصلية - طريق المطار',logo:'default-logo.jpeg'};
let current=null, mode='home', activeTab='عام', typeFilter='الكل';
function save(){localStorage.setItem(storeKey,JSON.stringify(properties));localStorage.setItem(settingsKey,JSON.stringify(settings));}
function show(id){document.querySelectorAll('.screen').forEach(x=>x.classList.remove('active'));$('#'+id).classList.add('active');mode=id;window.scrollTo(0,0)}
function safe(v){return (v??'').toString().trim()} function showVal(v){return safe(v)||'-'}
function statusClass(s){return ['متاح','عام'].includes(s)?'ok':(['تحت التفاوض','محجوز'].includes(s)?'warn':'off')}
function nextOffer(){let max=1000;properties.forEach(p=>{max=Math.max(max,Number(p.offer)||1000)});return max+1}
function icon(name){const m={home:'⌂',map:'⌖',area:'□',road:'▱',face:'◌',bed:'▭',bath:'♨',car:'▱',edit:'✎',trash:'🗑',archive:'▣',share:'↗',save:'✓',plus:'＋',gear:'⚙',phone:'☎',mail:'✉',link:'⌁'};return m[name]||'•'}
function homeRender(){const types=['الكل',...new Set(properties.map(p=>safe(p.type)).filter(Boolean))];let q=safe($('#homeSearch')?.value).toLowerCase()||'';let oq=safe($('#offerSearch')?.value)||'';let list=properties.filter(p=> activeTab==='عام' ? !p.archived : p.archived); if(typeFilter!=='الكل') list=list.filter(p=>p.type===typeFilter); if(oq) list=list.filter(p=>String(p.offer).includes(oq)); if(q) list=list.filter(p=>JSON.stringify(p).toLowerCase().includes(q));
$('#home').innerHTML=`<div class="top"><div class="brand"><img src="${settings.logo}"/><h1>إدارة العقارات</h1></div><div class="actions"><button class="btn" onclick="settingsRender();show('settings')">${icon('gear')}</button><button class="btn" onclick="activeTab='أرشيف';homeRender()">الأرشيف</button><button class="btn primary" onclick="formRender()">${icon('plus')} إضافة عقار</button></div></div><div class="search"><input id="homeSearch" placeholder="بحث شامل في كل التفاصيل: المالك، الحي، الشارع، النوع، المساحة..." oninput="homeRender()" value="${q}"><input id="offerSearch" placeholder="بحث برقم العرض فقط" oninput="homeRender()" value="${oq}"></div><div class="filters">${types.map(t=>`<button class="chip ${typeFilter===t?'active':''}" onclick="typeFilter='${t}';homeRender()">${t}<br><small>${t==='الكل'?properties.length:properties.filter(p=>p.type===t).length}</small></button>`).join('')}</div><div class="tabs"><button class="${activeTab==='عام'?'active':''}" onclick="activeTab='عام';homeRender()">عام (${properties.filter(p=>!p.archived).length})</button><button class="${activeTab==='أرشيف'?'active':''}" onclick="activeTab='أرشيف';homeRender()">الأرشيف (${properties.filter(p=>p.archived).length})</button></div><div>${list.length?list.map(card).join(''):'<div class="card empty">لا توجد عقارات مطابقة</div>'}</div>`}
function card(p){let img=p.images?.[0]||settings.logo;return `<div class="card property-card"><div class="thumb"><img src="${img}"><span class="badge ${statusClass(p.status)}" style="position:absolute;top:7px;right:7px">${showVal(p.status||'متاح')}</span></div><div class="pc"><div class="pc-head"><div><h3>${showVal(p.name||'عقار بدون اسم')}</h3><div class="hint">${showVal(p.city)} - ${showVal(p.district)}</div></div><div class="offer">رقم العرض<br>${showVal(p.offer)}</div></div><div class="meta"><span>${icon('area')} ${showVal(p.area)} م²</span><span>${icon('home')} ${showVal(p.type)}</span><span>${icon('road')} ${showVal(p.roadWidth)} م</span></div><div class="pc-actions"><button class="btn" onclick="detailsRender('${p.id}')">عرض التفاصيل</button><button class="iconbtn" onclick="formRender('${p.id}')">${icon('edit')}</button><button class="iconbtn" onclick="toggleArchive('${p.id}')">${p.archived?'نقل':'أرشفة'}</button><button class="iconbtn" onclick="deleteProp('${p.id}')">${icon('trash')}</button></div></div></div>`}
function emptyProp(){return {id:uid(),offer:nextOffer(),name:'',type:'',category:'',status:'متاح',city:'',district:'',street:'',mapLink:'',area:'',length:'',width:'',roadWidth:'',face:'',planNo:'',plotNo:'',rooms:'',baths:'',parking:'',services:[],description:'',ownerName:'',ownerPhone:'',brokerName:'',brokerPhone:'',brokerMainPhone:'',brokerCount:'',commission:'',price:'',lastBid:'',privateNotes:'',images:[],archived:false,createdAt:new Date().toISOString(),updatedAt:new Date().toISOString()}}
function formRender(id){current=id?properties.find(p=>p.id===id):emptyProp(); show('form'); $('#form').innerHTML=`<div class="page-head"><button class="btn" onclick="homeRender();show('home')">رجوع</button><div class="title">${id?'تعديل العقار':'إضافة عقار جديد'}</div></div>${formHtml(current)}<div class="footer-actions"><button class="btn" onclick="detailsRender('${current.id}')">معاينة</button><button class="btn primary" onclick="submitForm(false)">${icon('save')} حفظ العقار</button><button class="btn" onclick="submitForm(true)">حفظ وإضافة جديد</button></div>`; bindFormMedia()}
function formHtml(p){const f=(k,l,ph='',type='text')=>`<div class="field"><label>${l}</label><input name="${k}" type="${type}" placeholder="${ph}" value="${safe(p[k])}"></div>`;return `<div class="section"><h2>الصور والفيديو</h2><div class="media-row" id="mediaRow">${(p.images||[]).map((im,i)=>`<div class="media-item"><img src="${im}"><button onclick="removeImg(${i})">×</button></div>`).join('')}<button class="btn" onclick="$('#hiddenFile').click()">${icon('plus')} إضافة صور</button></div><p class="hint">الصور تظهر في PDF بنهاية الملف، كل صورتين جنب بعض وبمقاسات ثابتة.</p></div><div class="section"><h2>المعلومات الأساسية</h2><div class="grid">${f('name','اسم العقار','مثال: أرض سكنية بالشهابية')}${f('type','نوع العقار','فيلا / أرض / عمارة / محل')}${f('category','التصنيف','سكني / تجاري')}${f('status','الحالة','متاح / تحت التفاوض / مؤجر')}</div></div><div class="section"><h2>بيانات الموقع</h2><div class="grid">${f('city','المدينة')}${f('district','الحي')}${f('street','الشارع')}${f('mapLink','رابط الموقع أو الإحداثيات','الصق رابط Google Maps / Apple Maps / إحداثيات')}</div><p class="hint">الرابط داخل التطبيق والـ PDF يكون قابل للضغط ويفتح تطبيق الخرائط المتوفر على الجهاز.</p></div><div class="section"><h2>بيانات الأرض / العقار</h2><div class="grid">${f('area','المساحة','م²')}${f('length','الطول','م')}${f('width','العرض','م')}${f('roadWidth','عرض الشارع','م')}${f('face','واجهة العقار','شمال / جنوب / شرق / غرب')}${f('planNo','رقم المخطط')}${f('plotNo','رقم القطعة')}${f('rooms','عدد الغرف')}${f('baths','دورات المياه')}${f('parking','مواقف السيارات')}</div></div><div class="section"><h2>الخدمات والوصف</h2><div class="grid3"><div class="field"><label>الخدمات المتوفرة</label><textarea name="servicesText" placeholder="كل خدمة في سطر مستقل">${(p.services||[]).join('\n')}</textarea></div><div class="field" style="grid-column:span 2"><label>وصف العقار</label><textarea name="description" placeholder="اكتب وصف العقار هنا">${safe(p.description)}</textarea></div></div></div><div class="section private"><h2>معلومات داخلية لا تظهر في PDF المشاركة</h2><div class="grid">${f('ownerName','اسم المالك')}${f('ownerPhone','رقم المالك')}${f('brokerName','اسم الوسيط')}${f('brokerPhone','رقم الوسيط')}${f('brokerMainPhone','رقم الوسيط المباشر')}${f('brokerCount','عدد الوسطاء')}${f('commission','السعي','مثال: 2.5% أو 25000 ريال')}${f('price','السعر')}${f('lastBid','آخر سومة')}</div><div class="field"><label>ملاحظات خاصة</label><textarea name="privateNotes">${safe(p.privateNotes)}</textarea></div></div>`}
function bindFormMedia(){ $('#hiddenFile').onchange=e=>{[...e.target.files].forEach(file=>{const r=new FileReader();r.onload=()=>{current.images=current.images||[];current.images.push(r.result);formRender(current.id)};r.readAsDataURL(file)});e.target.value=''} }
function removeImg(i){current.images.splice(i,1);formRender(current.id)}
function submitForm(addNew){const data=new FormData(document.querySelector('#form form')||document.createElement('form')); document.querySelectorAll('#form [name]').forEach(el=>{current[el.name]=el.value}); current.services=safe(current.servicesText).split('\n').map(x=>x.trim()).filter(Boolean); delete current.servicesText; current.updatedAt=new Date().toISOString(); let idx=properties.findIndex(p=>p.id===current.id); if(idx>=0)properties[idx]=current;else properties.push(current); save(); if(addNew)formRender();else detailsRender(current.id)}
function detailsRender(id){let p=properties.find(x=>x.id===id); if(!p)return; current=p; show('details'); $('#details').innerHTML=`<div class="page-head"><button class="btn" onclick="homeRender();show('home')">رجوع</button><div class="title">عرض رقم ${p.offer}</div><button class="btn" onclick="formRender('${p.id}')">${icon('edit')} تعديل</button></div><div class="details-hero"><img src="${p.images?.[0]||settings.logo}"></div><div class="section"><h2>${showVal(p.name)}</h2><p>${showVal(p.city)} - ${showVal(p.district)} ${safe(p.street)?' - '+p.street:''}</p><div class="info-table">${cell('رقم العرض',p.offer)}${cell('نوع العقار',p.type)}${cell('التصنيف',p.category)}${cell('الحالة',p.status)}${cell('المساحة',p.area+' م²')}${cell('الطول',p.length+' م')}${cell('العرض',p.width+' م')}${cell('عرض الشارع',p.roadWidth+' م')}${cell('واجهة العقار',p.face)}${cell('رقم المخطط',p.planNo)}${cell('رقم القطعة',p.plotNo)}${cell('الغرف',p.rooms)}${cell('دورات المياه',p.baths)}${cell('المواقف',p.parking)}</div></div><div class="section"><h2>وصف العقار</h2><p>${showVal(p.description)}</p>${p.mapLink?`<a class="btn primary" href="${mapHref(p.mapLink)}" target="_blank">فتح الموقع في الخرائط</a>`:''}</div><div class="section"><h2>الخدمات المتوفرة</h2><div class="service-grid">${(p.services||[]).map(s=>`<div>${s}</div>`).join('')||'<div>-</div>'}</div></div><div class="section private"><h2>معلومات داخلية لا تظهر في المشاركة</h2><div class="info-table">${cell('المالك',`<span class="linkish" onclick="personList('ownerName','${p.ownerName}')">${showVal(p.ownerName)}</span>`)}${cell('رقم المالك',phoneLink(p.ownerPhone))}${cell('الوسيط',`<span class="linkish" onclick="personList('brokerName','${p.brokerName}')">${showVal(p.brokerName)}</span>`)}${cell('رقم الوسيط',phoneLink(p.brokerPhone))}${cell('عدد الوسطاء',p.brokerCount)}${cell('السعي',p.commission)}${cell('السعر',p.price)}${cell('آخر سومة',p.lastBid)}${cell('ملاحظات خاصة',p.privateNotes)}</div></div><div class="footer-actions"><button class="btn primary" onclick="formRender('${p.id}')">تعديل</button><button class="btn" onclick="printPdf('${p.id}')">مشاركة PDF</button><button class="btn gold" onclick="toggleArchive('${p.id}')">${p.archived?'نقل إلى العام':'أرشفة'}</button><button class="btn danger" onclick="deleteProp('${p.id}')">حذف</button></div>`}
function cell(l,v){return `<div class="info-cell"><b>${l}</b><span>${showVal(v)}</span></div>`} function phoneLink(v){return safe(v)?`<a href="tel:${v}" class="linkish">${v}</a>`:'-'}
function mapHref(v){v=safe(v); if(!v)return '#'; if(v.startsWith('http'))return v; if(v.includes(','))return 'https://maps.google.com/?q='+encodeURIComponent(v); return 'https://maps.google.com/?q='+encodeURIComponent(v)}
function personList(key,name){if(!safe(name))return;let list=properties.filter(p=>p[key]===name);alert(`العقارات المرتبطة بـ ${name}\nالإجمالي: ${list.length}\n`+list.map(p=>`${p.offer} - ${p.name}`).join('\n'))}
function toggleArchive(id){let p=properties.find(x=>x.id===id);p.archived=!p.archived;save();homeRender();show('home')} function deleteProp(id){if(confirm('حذف نهائي؟ الأفضل الأرشفة بدل الحذف.')){properties=properties.filter(p=>p.id!==id);save();homeRender();show('home')}}
function settingsRender(){show('settings');$('#settings').innerHTML=`<div class="page-head"><button class="btn" onclick="homeRender();show('home')">رجوع</button><div class="title">الإعدادات</div></div><div class="section"><h2>هوية المؤسسة</h2><div class="grid">${['company:اسم المؤسسة','phone1:رقم التواصل الأول','phone2:رقم التواصل الثاني','email:البريد الإلكتروني','address:العنوان'].map(x=>{let [k,l]=x.split(':');return `<div class="field"><label>${l}</label><input id="set_${k}" value="${safe(settings[k])}"></div>`}).join('')}</div><button class="btn primary" onclick="saveSettings()">حفظ الإعدادات</button></div><div class="section"><h2>النسخ الاحتياطي</h2><button class="btn" onclick="exportBackup()">تصدير نسخة احتياطية</button> <button class="btn" onclick="$('#backupFile').click()">استيراد نسخة احتياطية</button><p class="hint">تشمل العقارات والصور والشعار والإعدادات. لا ترفعها GitHub.</p></div>`;$('#backupFile').onchange=importBackup}
function saveSettings(){['company','phone1','phone2','email','address'].forEach(k=>settings[k]=$('#set_'+k).value);save();alert('تم الحفظ')}
function exportBackup(){let blob=new Blob([JSON.stringify({properties,settings},null,2)],{type:'application/json'});let a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='AqarBackup-'+new Date().toISOString().slice(0,10)+'.aqarbackup';a.click()}
function importBackup(e){let f=e.target.files[0];if(!f)return;let r=new FileReader();r.onload=()=>{let d=JSON.parse(r.result);properties=d.properties||[];settings=d.settings||settings;save();homeRender();show('home');alert('تم الاستيراد')};r.readAsText(f)}
function printPdf(id){let p=properties.find(x=>x.id===id); if(!p)return; $('#printRoot').innerHTML=printHtml(p); setTimeout(()=>window.print(),100)}
function pcell(l,v){return `<div class="p-cell"><label>${l}</label><span>${showVal(v)}</span></div>`}
function printHtml(p){let imgs=p.images||[];let gallery=imgs.length?imgs.map(im=>`<img src="${im}">`).join(''):'<div class="p-cell">لا توجد صور إضافية</div>';let services=(p.services||[]).map(s=>`<div>☑<br>${s}</div>`).join('')||'<div>-</div>';return `<div class="p-page"><div class="watermark"><img src="${settings.logo}"></div><div class="p-head"><div class="p-offer">عرض رقم<br><b>${p.offer}</b></div><div class="p-title"><h1>تقرير عقاري</h1><small>للاطلاع على بيانات العقار ومشاركته</small></div><div class="p-logo"><b>${settings.company}</b><img src="${settings.logo}"></div></div><div class="p-two"><img class="p-hero" src="${imgs[0]||settings.logo}"><div class="p-section"><div class="p-section-title">معلومات العقار الأساسية</div><div class="p-grid">${pcell('نوع العقار',p.type)}${pcell('التصنيف',p.category)}${pcell('الحالة',p.status)}${pcell('المدينة',p.city)}${pcell('الحي',p.district)}${pcell('المساحة',p.area+' م²')}${pcell('واجهة العقار',p.face)}${pcell('عرض الشارع',p.roadWidth+' م')}${pcell('رقم العرض',p.offer)}</div></div></div><div class="p-section"><div class="p-section-title">تفاصيل العقار</div><table class="p-table"><tr><th>البيان</th><th>القيمة</th><th>البيان</th><th>القيمة</th></tr><tr><td>الطول</td><td>${showVal(p.length)} م</td><td>العرض</td><td>${showVal(p.width)} م</td></tr><tr><td>رقم المخطط</td><td>${showVal(p.planNo)}</td><td>رقم القطعة</td><td>${showVal(p.plotNo)}</td></tr><tr><td>الغرف</td><td>${showVal(p.rooms)}</td><td>دورات المياه</td><td>${showVal(p.baths)}</td></tr><tr><td>المواقف</td><td>${showVal(p.parking)}</td><td>الموقع</td><td>${p.mapLink?`<a href="${mapHref(p.mapLink)}">فتح الموقع</a>`:'-'}</td></tr></table></div><div class="p-two"><div class="p-section"><div class="p-section-title">وصف العقار</div><div class="p-desc">${showVal(p.description)}</div></div><div class="p-section"><div class="p-section-title">الخدمات المتوفرة بالقرب من العقار</div><div class="p-services">${services}</div></div></div><div class="p-footer"><div>☎ ${settings.phone1}<br>☎ ${settings.phone2}</div><div>✉ ${settings.email}</div><div>⌖ ${settings.address}</div><div>${settings.company}<br><img src="${settings.logo}"></div></div></div><div class="p-page"><div class="watermark"><img src="${settings.logo}"></div><div class="p-head"><div class="p-offer">عرض رقم<br><b>${p.offer}</b></div><div class="p-title"><h1>صور العقار</h1><small>الصور مرتبة بمقاسات ثابتة</small></div><div class="p-logo"><b>${settings.company}</b><img src="${settings.logo}"></div></div><div class="p-section"><div class="p-section-title">صور العقار</div><div class="p-gallery">${gallery}</div></div><div class="p-footer"><div>☎ ${settings.phone1}<br>☎ ${settings.phone2}</div><div>✉ ${settings.email}</div><div>⌖ ${settings.address}</div><div>${settings.company}<br><img src="${settings.logo}"></div></div></div>`}
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{})}
homeRender();
</script>
</body>
</html>
